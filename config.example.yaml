# 复制为本地路径并重命名；通过环境变量 PUNKRECORDS_CONFIG 指向该文件。

materials_vault_path: "~/Obsidian/MaterialsVault"
domain_index_paths: {}
default_agent_backend: "claude_code"

# --- LLM 三项（anthropic 适配器）：BASE URL、API Key、模型 ---
# BASE URL：不填或 null 则用 SDK 默认（官方）；网关/代理时取消下一行注释并填写。
# llm_base_url: "https://api.anthropic.com"
llm_api_key: "sk-ant-..."
llm_model: "claude-sonnet-4-20250514"

# 兼容旧字段：仅当未设置 llm_api_key 时作为 Key 来源
# agent_api_key: "sk-ant-..."

# llm_provider 与简写 provider 等价；缺省为 fake。未设置 PUNKRECORDS_CONFIG 时，若在启动目录存在 config.yaml 也会自动加载。
llm_provider: "anthropic"
llm_timeout_seconds: 120
