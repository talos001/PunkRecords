# 复制为本地路径并重命名；通过环境变量 PUNKRECORDS_CONFIG 指向该文件。

materials_vault_path: "~/Obsidian/MaterialsVault"
domain_index_paths: {}
default_agent_backend: "claude_code"

# 可选：与 Anthropic 一致时可用 agent_api_key，或仅用环境变量 ANTHROPIC_API_KEY
# agent_api_key: "sk-ant-..."

llm_provider: "anthropic"
llm_model: "claude-sonnet-4-20250514"
llm_timeout_seconds: 120
